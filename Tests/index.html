  <style>

  <script>
    // Canvas-based text label — works with WebGPU renderer (unlike a-text SDF shader)
    AFRAME.registerComponent('label', {
      schema: {
        value: { type: 'string', default: '' },
        sub: { type: 'string', default: '' },
        scale: { type: 'number', default: 1.6 }
      },
      init: function () {
        return; // TEMP: labels disabled
        var canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 128;
        var ctx = canvas.getContext('2d');

        // Main label
        ctx.fillStyle = '#222222';
        ctx.font = 'bold 56px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.data.value, 128, 40);

        // Sub label
        if (this.data.sub) {
          ctx.fillStyle = '#666666';
          ctx.font = '32px Arial, sans-serif';
          ctx.fillText(this.data.sub, 128, 90);
        }

        var texture = new THREE.CanvasTexture(canvas);
        texture.needsUpdate = true;
        var s = this.data.scale;
        var geo = new THREE.PlaneGeometry(s, s * 0.5);
        var mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
        this.el.setObject3D('mesh', new THREE.Mesh(geo, mat));
      }
    });
  </script>
</head>
