<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FastShaders — WebGPU/TSL + WebXR demo</title>
<!--
  Standalone demo: three.js WebGPURenderer + TSL node materials + immersive WebXR.

  WHY forceWebGL IS THE DEFAULT (researched 2026-06-11):
  - Meta Quest Browser (146.x) has NO WebXR/WebGPU Binding (XRGPUBinding) — not
    behind any flag, simply unimplemented. The only immersive path on Quest is
    the classic WebXR/WebGL layer API.
  - three r173–r184: XRManager.setSession() hard-throws on a WebGPU backend
    ("Use WebGL by passing { forceWebGL: true }"). Native WebGPU-backend XR via
    XRGPUBinding merged to dev in May 2026 (PR #33583) and ships in r185+,
    working only on visionOS Safari and flag-enabled Chrome 135+.
  - forceWebGL keeps the SAME WebGPURenderer + TSL node pipeline (compiled by
    GLSLNodeBuilder instead of WGSLNodeBuilder), so shaders behave identically.
  - This is also exactly why the A-Frame WebGPU bundle hangs on the Meta
    loading screen: requestSession() succeeds, setSession() throws with no
    rejection handler, no layer is ever attached, zero frames are submitted.

  Open with ?backend=webgpu to run the real WebGPU backend (flat screen only on
  r183 — the VR button is replaced by an explanation so the hang above can
  never be reproduced from this page).

  Deployed: https://alvis1.github.io/FastShaders/webgpu-xr-demo.html
  Dev:      http://localhost:5173/FastShaders/webgpu-xr-demo.html
  (WebXR needs a secure context: https or localhost.)
-->
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #10141c; }
  #hud {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    font: 12px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #cdd6e4; background: rgba(16, 20, 28, 0.82);
    border: 1px solid #2a3140; border-radius: 8px; padding: 10px 14px;
    pointer-events: none; white-space: pre; user-select: none;
  }
  #hud b { color: #fff; }
  #hud .ok { color: #5dd39e; }
  #hud .no { color: #f08a8a; }
  #webgpu-note {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10;
    font: 13px/1.5 system-ui, sans-serif; color: #ffd9a0;
    background: rgba(16, 20, 28, 0.9); border: 1px solid #6b5328;
    border-radius: 8px; padding: 10px 16px; max-width: 560px; text-align: center;
  }
  #webgpu-note a { color: #9fb4ff; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.webgpu.min.js",
    "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.webgpu.min.js",
    "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.tsl.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="hud">loading…</div>
<script type="module">
import * as THREE from 'three/webgpu';
import {
  color, mix, mx_fractal_noise_float, normalLocal, positionLocal, time, vec3,
} from 'three/tsl';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const wantWebGPUBackend = new URLSearchParams(location.search).get('backend') === 'webgpu';

const renderer = new THREE.WebGPURenderer({
  antialias: true,
  forceWebGL: !wantWebGPUBackend,
  // Default output buffers are HalfFloat (64-bit color) — too heavy for Quest
  // fill rate. All official webgpu_xr_* examples pass UnsignedByteType.
  outputBufferType: THREE.UnsignedByteType,
  // NOTE: multiview:true (single-pass stereo, big CPU win on Quest) is left
  // off — three issue #32538 (right-eye projection error) is still open.
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x10141c);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 3);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.2, 0);
controls.enableDamping = true;

scene.add(new THREE.HemisphereLight(0xbdd4ff, 0x3a2e22, 1.2));
const sun = new THREE.DirectionalLight(0xfff2dd, 2.0);
sun.position.set(2, 4, 1);
scene.add(sun);

// Floor: solid disc + grid, placed at y=0 so 'local-floor' reference space
// puts it at the real floor.
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(5, 64).rotateX(-Math.PI / 2),
  new THREE.MeshStandardMaterial({ color: 0x1a2030, roughness: 0.95 }),
);
scene.add(floor);
const grid = new THREE.GridHelper(10, 20, 0x44506a, 0x2a3140);
grid.position.y = 0.002;
scene.add(grid);

// Hero sphere: TSL node material using the same MaterialX fractal noise the
// FastShaders editor emits — proves the TSL pipeline end-to-end in immersive.
const noise = mx_fractal_noise_float(positionLocal.mul(2.0).add(vec3(0, time.mul(0.25), 0)));
const noise01 = noise.mul(0.5).add(0.5).clamp(0, 1);
const heroMat = new THREE.MeshStandardNodeMaterial({ roughness: 0.35, metalness: 0.1 });
heroMat.colorNode = mix(color(0x1c64f2), color(0xff7a1a), noise01);
heroMat.positionNode = positionLocal.add(normalLocal.mul(noise.mul(0.08)));
const hero = new THREE.Mesh(new THREE.SphereGeometry(0.5, 128, 96), heroMat);
hero.position.set(0, 1.3, 0);
scene.add(hero);

// A ring of plain cubes for depth/scale reference.
const cubes = new THREE.Group();
const cubeGeo = new THREE.BoxGeometry(0.18, 0.18, 0.18);
for (let i = 0; i < 8; i++) {
  const a = (i / 8) * Math.PI * 2;
  const m = new THREE.Mesh(
    cubeGeo,
    new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(i / 8, 0.6, 0.55), roughness: 0.5 }),
  );
  m.position.set(Math.cos(a) * 1.4, 1.3 + Math.sin(a * 3) * 0.1, Math.sin(a) * 1.4);
  cubes.add(m);
}
scene.add(cubes);

// Controller rays (no external model profiles needed).
for (let i = 0; i < 2; i++) {
  const ctrl = renderer.xr.getController(i);
  const ray = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -1)]),
    new THREE.LineBasicMaterial({ color: 0x9fb4ff }),
  );
  ray.scale.z = 3;
  ctrl.add(ray);
  scene.add(ctrl);
}

// ── Diagnostics HUD ─────────────────────────────────────────────────────────
const hud = document.getElementById('hud');
const yes = (v) => (v ? '<span class="ok">yes</span>' : '<span class="no">no</span>');
let sessionState = 'none';

async function updateHud() {
  const usingWebGPU = !!(renderer.backend && renderer.backend.isWebGPUBackend);
  let vrSupported = false;
  try { vrSupported = !!(navigator.xr && await navigator.xr.isSessionSupported('immersive-vr')); } catch { /* blocked */ }
  hud.innerHTML =
    `<b>FastShaders WebGPU/XR probe</b> — three r${THREE.REVISION}\n` +
    `backend in use      : <b>${usingWebGPU ? 'WebGPU (WGSL)' : 'WebGL2 (GLSL)'}</b>${usingWebGPU ? '' : wantWebGPUBackend ? ' (WebGPU unavailable)' : ' (forced for XR)'}\n` +
    `secure context      : ${yes(window.isSecureContext)}\n` +
    `navigator.gpu       : ${yes('gpu' in navigator)}\n` +
    `XRGPUBinding        : ${yes('XRGPUBinding' in window)} (WebXR/WebGPU binding)\n` +
    `immersive-vr        : ${yes(vrSupported)}\n` +
    `xr session          : ${sessionState}`;
}

renderer.xr.addEventListener('sessionstart', () => { sessionState = 'presenting'; updateHud(); });
renderer.xr.addEventListener('sessionend', () => { sessionState = 'ended'; updateHud(); });

// ── Boot ────────────────────────────────────────────────────────────────────
await renderer.init();

if (renderer.backend && renderer.backend.isWebGPUBackend) {
  // r183 cannot attach an XR layer on the WebGPU backend — showing the VR
  // button here would reproduce the exact infinite-loading hang this demo
  // exists to demonstrate the fix for. Explain instead.
  const note = document.createElement('div');
  note.id = 'webgpu-note';
  note.innerHTML =
    'Running on the <b>WebGPU backend</b> — flat rendering only. ' +
    'three r183 + Quest Browser cannot do immersive XR over WebGPU (no XRGPUBinding). ' +
    '<a href="' + location.pathname + '">Reload in XR-capable mode</a>';
  document.body.appendChild(note);
} else {
  document.body.appendChild(VRButton.createButton(renderer));
}
updateHud();

renderer.setAnimationLoop((t) => {
  if (!renderer.xr.isPresenting) controls.update();
  cubes.rotation.y = t / 5000;
  hero.rotation.y = t / 9000;
  renderer.render(scene, camera);
});

window.addEventListener('resize', () => {
  if (renderer.xr.isPresenting) return; // resizing mid-session is disallowed (three r175+)
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
