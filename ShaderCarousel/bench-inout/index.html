<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sphere InOut — immersive WebXR bench</title>
  <link rel="stylesheet" href="../lib/bench-style.css">

  <!-- A-Frame 1.8.0 IIFE bundle, Three.js r184 WebGPU build.
       WebGL backend on Quest 3 is the only stable WebXR path right now —
       the Three.js WebGPU XR manager doesn't reliably submit XR frames on
       Meta Quest Browser (paper § 5.2 + carousel.html notes). -->
  <script src="../components/three/a-frame-180-a-01.min.js"></script>

  <!-- Sphere mover (linear ping-pong over `duration` ms; emits cycle-complete
       so this bench can advance to the next shader). This bench assigns
       MeshPhysicalNodeMaterial directly via its object3D, so it does NOT
       use the tsl-shader A-Frame component / shaderloader.js. -->
  <script src="../sphere-mover.js" type="module"></script>

  <!-- Bench logic — listens for cycle-complete, applies next shader, logs
       rAF deltas. NO auto-start; everything is gated on the Start button. -->
  <script src="./bench.js" type="module"></script>
</head>
<body>
  <div id="progress-bar"></div>
  <div id="error-overlay"></div>

  <div id="hud">
    <span class="badge badge-inout">InOut</span>
    <span><span class="label">Shader: </span><span class="value" id="hud-shader">—</span></span>
    <span><span class="label">FT: </span><span class="value" id="hud-ft">—</span></span>
    <span><span class="label">Avg FPS: </span><span class="value" id="hud-fps">—</span></span>
    <span><span class="label">Progress: </span><span class="value" id="hud-progress">—</span></span>
    <span><span class="label">Phase: </span><span class="value" id="hud-phase">idle</span></span>
    <span><span class="label">XR: </span><span class="value" id="hud-xr">no</span></span>
  </div>

  <div id="controls">
    <button id="btn-start" class="primary">▶ Start (Enter VR)</button>
    <button id="btn-stop" class="danger" disabled>Stop</button>
    <button id="btn-shaders" type="button">Shaders</button>
    <button id="btn-log" type="button">Log</button>
    <div class="sep"></div>
    <label class="field">Cycle s
      <input id="input-cycle" type="number" min="2" max="30">
    </label>
    <label class="field">Warmup ms
      <input id="input-warmup-ms" type="number" min="0" max="3000">
    </label>
    <label class="field">Log every Nth
      <input id="input-stride" type="number" min="1" max="50">
    </label>
    <div class="sep"></div>
    <span class="lbl">Headset: <span id="hud-headset">detecting…</span></span>
    <div class="sep"></div>
    <button id="btn-reset" type="button">Reset defaults</button>
  </div>

  <div id="shader-picker"><div id="pick-list"></div></div>
  <div id="log"></div>

  <a-scene
    id="scene"
    webxr="optionalFeatures: local-floor, bounded-floor"
    renderer="antialias: true; highRefreshRate: true; colorManagement: true; foveationLevel: 0; alpha: false"
    background="color: #000"
    loading-screen="enabled: false">

    <a-entity id="rig" position="0 1.6 0">
      <!--
        The sphere is the measurement surface. `tsl-shader` defers to the
        shaderloader component (which compiles the chosen TSL module into a
        MeshPhysicalNodeMaterial); `side: back` inverts normals so the user
        is inside the sphere at z=0 and sees the shader on all sides.
        sphere-mover is initialised at autostart=false — the bench drives
        each cycle manually so it can be gated on Start + VR entry.
      -->
      <a-sphere
        id="sphere"
        radius="2.5"
        segments-width="64"
        segments-height="32"
        material="color: #888"
        sphere-mover="startZ: -10; centerZ: 0; duration: 10000; autostart: false">
      </a-sphere>

      <a-entity camera look-controls position="0 0 0"></a-entity>
    </a-entity>

    <a-entity light="type: ambient; intensity: 1.0; color: #ffffff"></a-entity>
  </a-scene>
</body>
</html>
