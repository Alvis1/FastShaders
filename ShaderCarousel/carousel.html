<html>
  <head>
    <meta charset="utf-8">
    <title>ShaderCarousel — TSL Shader Benchmarking</title>

    <!--
      A-Frame 1.7 IIFE bundle. Same bundle the main FastShaders app's preview
      iframes use. Critically, this bundle exports BOTH `THREE.WebGLRenderer`
      and `THREE.WebGPURenderer`. A-Frame's renderer-construction picks
      `WebGLRenderer` first when both are available, which gives us the
      mature, well-tested WebXR path on Quest 3.

      The previous `super-three.webgpu.js` setup forced WebGPURenderer (its
      bundle only exports that one), and Three.js's WebGPU XRManager either
      throws on session entry (with WebGPU backend) or fails to submit XR
      frames after entry (with forceWebGL backend) — that's the "Meta loading
      teleport screen never goes away" symptom. The WebGL renderer doesn't
      have either issue.
    -->
    <script src="./components/three/aframe-171-a-0.1.min.js"></script>

    <!-- TSL shader loader (extends the FastShaders shaderloader with `side`
         schema for inverted-normals support; see shaderloader.js). -->
    <script src="./shaderloader.js" type="module"></script>

    <!-- Sphere mover (10s linear ping-pong on z) and benchmark cycler -->
    <script src="./sphere-mover.js" type="module"></script>
    <script src="./benchmark.js" type="module"></script>

    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    </style>
  </head>
  <body>
    <!--
      WebXR / Quest 3 immersive notes:
      - `webxr` attribute requests `local-floor`/`bounded-floor` reference
        spaces; A-Frame auto-injects the VR button when WebXR is available.
      - The sphere/camera live inside a rig at eye height (1.6m) so the sphere
        passes through the user's head when its center reaches z=0.
      - Renderer is THREE.WebGLRenderer (selected automatically by A-Frame
        from the IIFE bundle's exports). XR sessions work on Quest 3 over
        HTTPS in the Meta Browser without flags.
    -->
    <a-scene
      webxr="optionalFeatures: local-floor, bounded-floor"
      background="color: #000">

      <a-entity id="rig" position="0 1.6 0">
        <!-- src starts empty; benchmark's first setAttribute populates it,
             which guarantees update() fires applyShader (no-op-update race). -->
        <a-sphere
          id="sphere"
          radius="2.5"
          segments-width="64"
          segments-height="32"
          tsl-shader="side: back"
          sphere-mover="startZ: -10; centerZ: 0; duration: 10000">
        </a-sphere>

        <a-entity camera look-controls position="0 0 0"></a-entity>
      </a-entity>

      <!-- Single ambient light at intensity 1.0, no other lights -->
      <a-entity light="type: ambient; intensity: 1.0; color: #ffffff"></a-entity>

      <!-- Drives the playlist + frame stats + JSON download -->
      <a-entity benchmark="sphere: #sphere"></a-entity>
    </a-scene>
  </body>
</html>
