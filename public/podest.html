<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Podest</title>
<!--
  Podest — standalone full-screen TSL shader viewer.

  Drag-and-drop:
    • Shader script (.js / .mjs / .tsl) — a FastShaders export OR any TSL ES
      module that `export default`s a Fn and imports from 'three/tsl'. Its
      property uniforms become live sliders (auto-detected by the shaderloader).
    • 3D model (.glb / .gltf) — becomes the mesh the shader runs on; a toggle
      switches between the shader and the model's own PBR materials.
    • Archive (.zip) — unzipped in-browser (native DecompressionStream, no
      dependency); the first shader script + first model inside are loaded.

  SECURITY MODEL — the same as the in-app preview: dropped/shared shader code is
  treated as ADVERSARIAL and executes ONLY inside a sandboxed iframe
  (sandbox="allow-scripts", NO allow-same-origin → opaque origin). The top-level
  document (this page, its localStorage, the drop UI) is never reachable by
  shader code; the two sides talk exclusively over postMessage. Blob URLs are
  origin-scoped, so shader source and model bytes are shipped into the iframe
  and their blob URLs are minted there.

  Self-contained: the iframe loads the SAME vendored A-Frame 1.8.0 + Three.js
  r184 WebGPU bundle and shaderloader 0.4 the app uses (absolute URLs off this
  page's origin), so it deploys anywhere the app does (e.g. alvismisjuns.podest.lv).
  Reached from the editor's "P" toolbar button.

  Dev:      http://localhost:5173/FastShaders/podest.html
  Deployed: <origin>/FastShaders/podest.html
-->
<style>
  :root {
    --panel-bg: #f7f7f8;
    --panel-border: #d7d7db;
    --text: #1b1c1f;
    --text-dim: #6a6c72;
    --accent: #2f6df6;
    --shadow: 4px 4px 0 rgba(0, 0, 0, 0.12);
  }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #202227;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #stage { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; display: block; }

  /* ── Property panel ─────────────────────────────────────────────── */
  #panel {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 288px; max-height: calc(100vh - 24px);
    display: flex; flex-direction: column;
    background: var(--panel-bg); border: 1px solid var(--panel-border);
    border-radius: 8px; box-shadow: var(--shadow);
    color: var(--text); font-size: 13px; overflow: hidden;
  }
  #panel.collapsed .panel__body { display: none; }
  .panel__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border-bottom: 1px solid var(--panel-border);
    cursor: pointer; user-select: none;
  }
  .panel__title { font-weight: 700; letter-spacing: -0.01em; }
  .panel__collapse { background: none; border: none; font-size: 15px; color: var(--text-dim); cursor: pointer; line-height: 1; padding: 0 2px; }
  .panel__body { overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 14px; }

  .dropzone {
    border: 1.5px dashed var(--panel-border); border-radius: 6px;
    padding: 14px 10px; text-align: center; color: var(--text-dim);
    cursor: pointer; transition: border-color .12s, color .12s, background .12s; line-height: 1.4;
  }
  .dropzone:hover { border-color: var(--accent); color: var(--accent); }
  .dropzone strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 2px; }

  .loaded { display: flex; flex-direction: column; gap: 3px; font-size: 11px; color: var(--text-dim); }
  .loaded .row { display: flex; gap: 6px; align-items: baseline; }
  .loaded .row span:first-child { flex-shrink: 0; }
  .loaded .name { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .section__label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 6px; }
  .controls-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  select, .btn {
    font: inherit; font-size: 12px; background: #fff; color: var(--text);
    border: 1px solid var(--panel-border); border-radius: 5px; padding: 5px 8px; cursor: pointer;
  }
  select { flex: 1; min-width: 0; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn[hidden] { display: none; }
  .ctl-label { flex-shrink: 0; min-width: 72px; font-size: 12px; color: var(--text-dim); }
  .color-input { width: 34px; height: 28px; flex-shrink: 0; padding: 0; border: 1px solid var(--panel-border); border-radius: 5px; background: #fff; cursor: pointer; }
  .speed-slider { flex: 1; min-width: 0; accent-color: var(--accent); cursor: pointer; margin: 0; }

  /* ── Uniform sliders ────────────────────────────────────────────── */
  #uniforms { display: flex; flex-direction: column; gap: 12px; }
  #uniforms .empty { color: var(--text-dim); font-size: 11px; font-style: italic; }
  .u-row { display: flex; flex-direction: column; gap: 4px; }
  .u-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .u-name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .u-val { font-variant-numeric: tabular-nums; font-size: 12px; color: var(--accent); background: #fff; border: 1px solid var(--panel-border); border-radius: 4px; width: 62px; text-align: right; padding: 1px 4px; flex-shrink: 0; }
  .u-slider { width: 100%; accent-color: var(--accent); cursor: pointer; margin: 0; }
  .u-bounds { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-dim); }
  .u-bounds input { width: 52px; font: inherit; font-size: 10px; color: var(--text-dim); background: #fff; border: 1px solid var(--panel-border); border-radius: 4px; padding: 1px 3px; text-align: center; }
  .u-bounds span { flex: 1; text-align: center; }

  /* ── Drop overlay + error ───────────────────────────────────────── */
  #overlay { position: fixed; inset: 0; z-index: 40; display: none; align-items: center; justify-content: center; background: rgba(30, 40, 70, 0.55); backdrop-filter: blur(2px); color: #fff; font-size: 22px; font-weight: 700; pointer-events: none; }
  #overlay.show { display: flex; }
  /* max-height + overflow bound the banner — its text is sandbox-controlled
     (fs:error), so it must not be able to grow over the whole page. */
  #error { position: fixed; top: 12px; left: 12px; z-index: 30; max-width: 42vw; max-height: 40vh; overflow-y: auto; color: #fff; background: rgba(180, 40, 40, 0.92); font: 12px/1.5 ui-monospace, Menlo, monospace; white-space: pre-wrap; padding: 8px 12px; border-radius: 6px; display: none; }
  #error.show { display: block; }
  #hint { position: fixed; bottom: 12px; left: 12px; z-index: 20; color: rgba(255,255,255,0.6); font-size: 11px; pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<!-- allow needs the explicit `*`: a bare feature name means the 'src'
     allowlist, which can never match this srcdoc iframe's sandbox-issued
     OPAQUE origin — Safari then blocks fullscreen by permissions policy. -->
<iframe id="stage" sandbox="allow-scripts" allow="fullscreen *; xr-spatial-tracking *" allowfullscreen title="Shader stage"></iframe>
<div id="error"></div>
<div id="overlay">Drop shader · model · zip</div>
<div id="hint">Drop a shader (.js/.tsl), a model (.glb), or a .zip anywhere — or click the panel drop area.</div>

<div id="panel">
  <div class="panel__head" id="panel-head">
    <span class="panel__title">Podest</span>
    <button class="panel__collapse" id="panel-collapse" title="Collapse">▾</button>
  </div>
  <div class="panel__body">
    <div class="dropzone" id="dropzone">
      <strong>Drop a file</strong>
      shader (.js / .tsl) · model (.glb) · archive (.zip)
    </div>
    <input type="file" id="file-input" accept=".js,.mjs,.tsl,.txt,.glb,.gltf,.zip" multiple hidden />

    <div class="loaded" id="loaded" hidden></div>

    <div class="section">
      <div class="section__label">Scene</div>
      <div class="controls-row">
        <select id="geo-select">
          <option value="sphere">Sphere</option>
          <option value="cube">Cube</option>
          <option value="plane">Plane</option>
          <option value="teapot">Teapot</option>
          <option value="bunny">Bunny</option>
        </select>
        <button class="btn active" id="spin-toggle" title="Toggle auto-rotate">Spin</button>
      </div>
      <div class="controls-row" style="margin-top:6px;">
        <button class="btn" id="mat-toggle" hidden title="Switch between the shader and the model's own materials">Show model materials</button>
        <button class="btn" id="reset-view" title="Reset camera">Reset view</button>
      </div>
      <div class="controls-row" style="margin-top:6px;">
        <label class="ctl-label" for="bg-color">Background</label>
        <input type="color" id="bg-color" class="color-input" title="Scene background color" />
      </div>
      <div class="controls-row" style="margin-top:6px;">
        <label class="ctl-label" for="spin-speed">Spin speed</label>
        <input type="range" id="spin-speed" class="speed-slider" min="0.1" max="4" step="0.05" title="Auto-rotate speed (use the Spin button to stop)" />
      </div>
    </div>

    <div class="section">
      <div class="section__label">Properties</div>
      <div id="uniforms"><div class="empty">Load a shader to expose its properties.</div></div>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";
  var stage = document.getElementById("stage");
  var errEl = document.getElementById("error");
  var loadedEl = document.getElementById("loaded");
  var uniformsEl = document.getElementById("uniforms");
  var matToggle = document.getElementById("mat-toggle");
  var geoSelect = document.getElementById("geo-select");
  var overlay = document.getElementById("overlay");

  // Per-geometry resting tilt, matching the in-app preview.
  var ROTATIONS = { sphere: "45 45 0", cube: "45 45 0", plane: "0 0 0", teapot: "15 35 0", bunny: "0 25 0", model: "0 0 0" };

  var DEFAULT_BG = "#303540", SPIN_BASE_DUR = 12000;  // dur at speed 1×
  var state = {
    shaderSource: null,    // text of the current shader module (null = none)
    shaderName: null,
    modelBytes: null,      // ArrayBuffer of a dropped GLB (null = none)
    modelName: null,
    geometry: "sphere",
    showMaterials: false,  // model-materials mode (shader detached in the iframe)
    spinning: readStr("fs:viewerSpin", "1") !== "0",
    spinSpeed: clampSpeed(readNum("fs:viewerSpinSpeed", 1)),
    bgColor: isHex6(readStr("fs:viewerBg", DEFAULT_BG)) ? readStr("fs:viewerBg", DEFAULT_BG) : DEFAULT_BG,
    bounds: loadBounds(),  // { uniformName: {min,max} } persisted here (top origin)
    values: {},            // last slider value per uniform name
  };
  // A slower/faster rotation is a longer/shorter animation duration.
  function spinDur() { return Math.round(SPIN_BASE_DUR / (state.spinSpeed || 1)); }
  var objCache = {};       // built-in OBJ bytes, fetched once

  // fromStage tags errors relayed from the sandboxed stage iframe (fs:error).
  // Only those may be cleared by the stage's fs:applied — trusted-page errors
  // (zip/file-read failures etc.) must never be clearable from the sandbox.
  // Length-capped: the text is sandbox-controlled on the fs:error path.
  var errorFromStage = false, errorSticky = false;
  function showError(msg, fromStage, sticky) {
    errEl.textContent = String(msg).slice(0, 2000);
    errEl.classList.add("show");
    errorFromStage = !!fromStage;
    errorSticky = !!sticky;
  }
  function clearError() { errEl.classList.remove("show"); errEl.textContent = ""; errorFromStage = false; errorSticky = false; }

  // Escape dynamic strings (esp. dropped file names from shared archives) before
  // they enter innerHTML/title on this trusted top document.
  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function loadBounds() { try { return JSON.parse(localStorage.getItem("fs:viewerBounds") || "{}") || {}; } catch (e) { return {}; } }
  function saveBounds() { try { localStorage.setItem("fs:viewerBounds", JSON.stringify(state.bounds)); } catch (e) {} }

  // Small persisted-preference readers (all guarded — private-mode / disabled
  // storage must degrade to the default, never throw).
  function readStr(k, d) { try { var v = localStorage.getItem(k); return (v === null || v === "") ? d : v; } catch (e) { return d; } }
  function readNum(k, d) { var n = parseFloat(readStr(k, "")); return isFinite(n) ? n : d; }
  function writePref(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
  function isHex6(s) { return /^#[0-9a-fA-F]{6}$/.test(String(s)); }
  function clampSpeed(s) { return Math.min(4, Math.max(0.1, isFinite(s) ? s : 1)); }

  // ── postMessage bridge to the sandboxed stage iframe ────────────────
  var stageReady = false;
  var outQueue = [];
  var iframeDrag = false;  // is a file being dragged over the stage iframe?
  function post(msg) {
    if (stageReady && stage.contentWindow) stage.contentWindow.postMessage(msg, "*");
    else outQueue.push(msg);
  }
  window.addEventListener("message", function (e) {
    // Accept only the stage iframe; it has an opaque origin so we can't check by
    // origin — identity via contentWindow is the reliable guard.
    if (e.source !== stage.contentWindow) return;
    var m = e.data; if (!m) return;
    if (m.type === "fs:ready") {
      stageReady = true;
      var q = outQueue; outQueue = [];
      q.forEach(function (x) { stage.contentWindow.postMessage(x, "*"); });
    } else if (m.type === "fs:uniforms") {
      if (!state.showMaterials) onUniforms(m.uniforms || {});
    } else if (m.type === "fs:error") {
      showError(m.message || "Shader stage error", true, !!m.sticky);
    } else if (m.type === "fs:applied") {
      // A shader applied successfully — clear a stale stage failure. Trusted
      // top-page errors are out of the sandbox's reach, and sticky stage
      // errors (vendored-script load failures) still matter after a
      // successful apply (see showError).
      if (errorFromStage && !errorSticky) clearError();
    } else if (m.type === "fs:drag") {
      // A drag entered/left/moved over the stage iframe (which fills the
      // viewport and swallows drag events over that whole area) — mirror the
      // drop overlay. Repeated on:true beats also re-arm the safety timeout.
      iframeDrag = !!m.on; refreshOverlay();
    } else if (m.type === "fs:dropped") {
      // Files were dropped ONTO the stage iframe; it forwarded the File objects
      // here so a drop anywhere loads through the same path as a panel drop.
      // Zero BOTH drag counters (a stage drop produces no parent dragleave, so
      // dragDepth would otherwise stay >0 and keep the veil up) and accept only
      // real File objects — a forged message can't crash the loader.
      dragDepth = 0; iframeDrag = false; refreshOverlay();
      var dropped = Array.isArray(m.files) ? m.files.filter(function (f) { return f instanceof File; }) : [];
      if (dropped.length) handleFiles(dropped);
    }
  });

  // ── Geometry / model plumbing (all applied inside the iframe) ────────
  function isObjKey(k) { return k === "teapot" || k === "bunny"; }
  function primAttr(kind) {
    if (kind === "cube") return "primitive: box; width: 1.4; height: 1.4; depth: 1.4; segmentsWidth: 48; segmentsHeight: 48; segmentsDepth: 48";
    if (kind === "plane") return "primitive: plane; width: 2; height: 2; segmentsWidth: 64; segmentsHeight: 64";
    return "primitive: sphere; radius: 1; segmentsWidth: 64; segmentsHeight: 64";
  }
  // Built-in OBJ models are fetched same-origin HERE (always works) and their
  // bytes shipped into the iframe, so the sandbox never needs cross-origin CORS.
  function ensureObjBytes(kind) {
    if (objCache[kind]) return Promise.resolve(objCache[kind]);
    var file = kind === "bunny" ? "stanford-bunny.obj" : "teapot.obj";
    var url = new URL("models/" + file, window.location.href).href;
    return fetch(url).then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.arrayBuffer();
    }).then(function (buf) { objCache[kind] = buf; return buf; });
  }

  function setGeometry(kind) {
    state.geometry = kind;
    if (kind === "model" && state.modelBytes) {
      post({ type: "fs:model", modelType: "gltf", bytes: state.modelBytes, regen: false, rotation: ROTATIONS[kind] });
    } else if (isObjKey(kind)) {
      ensureObjBytes(kind)
        .then(function (buf) { post({ type: "fs:model", modelType: "obj", bytes: buf, regen: true, rotation: ROTATIONS[kind] }); })
        .catch(function (e) { showError("Could not load " + kind + ": " + e.message); });
    } else {
      post({ type: "fs:geometry", geometryAttr: primAttr(kind), rotation: ROTATIONS[kind] });
    }
  }

  // ── Shader / model loading ──────────────────────────────────────────
  function loadShaderText(text, name) {
    clearError();
    state.shaderSource = text;
    // Display name only — drop the .js/.mjs/.tsl extension from the panel.
    // Extension-only names (a file literally called ".js") strip to "", so
    // fall back to the raw name rather than hiding the row.
    var displayName = name ? String(name).replace(/\.[^./\\]+$/, "") : "";
    state.shaderName = displayName || (name ? String(name) : "shader");
    state.showMaterials = false;
    matToggle.classList.remove("active");
    matToggle.textContent = "Show model materials";
    post({ type: "fs:shader", source: text });
    updateLoaded();
  }

  function loadModelBuffer(buf, name) {
    // Normalize to a standalone ArrayBuffer so it survives structured-clone
    // messaging regardless of whether the source was a File or a zip slice.
    var ab = buf instanceof ArrayBuffer ? buf : buf.buffer.slice(buf.byteOffset, buf.byteOffset + buf.byteLength);
    state.modelBytes = ab;
    state.modelName = name || "model.glb";
    if (!geoSelect.querySelector('option[value="model"]')) {
      var opt = document.createElement("option");
      opt.value = "model"; opt.textContent = "Loaded model";
      geoSelect.appendChild(opt);
    }
    geoSelect.value = "model";
    matToggle.hidden = false;
    setGeometry("model");
    updateLoaded();
  }

  // ── Uniform sliders ─────────────────────────────────────────────────
  function guessBounds(def) {
    var d = Number(def) || 0, min = 0, max = 1;
    if (d < 0) { min = Math.min(-1, d * 2); max = Math.max(1, -d); }
    else if (d > 1) { max = d * 2; }
    if (min === max) { min = d - 1; max = d + 1; }
    return { min: min, max: max };
  }

  // Called with the iframe-reported { name: defaultValue } map after each apply.
  function onUniforms(map) {
    uniformsEl.innerHTML = "";
    var names = Object.keys(map);
    if (!names.length) {
      uniformsEl.innerHTML = state.shaderSource
        ? '<div class="empty">This shader exposes no adjustable properties.</div>'
        : '<div class="empty">Load a shader to expose its properties.</div>';
      return;
    }
    names.forEach(function (name) {
      var def = typeof map[name] === "number" ? map[name] : 0;
      // hasOwnProperty guards: a uniform named 'constructor'/'toString'/etc.
      // must not resolve to an inherited Object.prototype member (which would
      // throw DataCloneError when postMessage'd and abort the whole forEach).
      var current = Object.prototype.hasOwnProperty.call(state.values, name) ? state.values[name] : def;
      state.values[name] = current;
      var b = (Object.prototype.hasOwnProperty.call(state.bounds, name) && state.bounds[name]) || guessBounds(def);
      state.bounds[name] = b;

      var row = document.createElement("div");
      row.className = "u-row";
      row.innerHTML =
        '<div class="u-head"><span class="u-name" title="' + esc(name) + '">' + esc(name) + '</span>' +
        '<input class="u-val" type="number" step="any" /></div>' +
        '<input class="u-slider" type="range" />' +
        '<div class="u-bounds"><input class="u-min" type="number" step="any" /><span>min · max</span><input class="u-max" type="number" step="any" /></div>';

      var valInput = row.querySelector(".u-val");
      var slider = row.querySelector(".u-slider");
      var minInput = row.querySelector(".u-min");
      var maxInput = row.querySelector(".u-max");

      function syncRange() { slider.min = b.min; slider.max = b.max; slider.step = ((b.max - b.min) / 200) || 0.001; }
      function setValue(v, fromSlider) {
        if (isNaN(v)) return;
        state.values[name] = v;
        post({ type: "fs:uniform", name: name, value: v });
        valInput.value = Number(v.toFixed(4));
        if (!fromSlider) slider.value = v;
      }
      syncRange();
      minInput.value = b.min; maxInput.value = b.max;
      slider.value = current;
      valInput.value = Number(current.toFixed ? current.toFixed(4) : current);
      // Push the restored/current value into the freshly-applied shader.
      post({ type: "fs:uniform", name: name, value: current });

      slider.addEventListener("input", function () { setValue(parseFloat(slider.value), true); });
      valInput.addEventListener("change", function () { setValue(parseFloat(valInput.value), false); });
      minInput.addEventListener("change", function () {
        var m = parseFloat(minInput.value); if (isNaN(m)) return;
        b.min = m; state.bounds[name] = b; saveBounds(); syncRange(); slider.value = state.values[name];
      });
      maxInput.addEventListener("change", function () {
        var m = parseFloat(maxInput.value); if (isNaN(m)) return;
        b.max = m; state.bounds[name] = b; saveBounds(); syncRange(); slider.value = state.values[name];
      });

      uniformsEl.appendChild(row);
    });
  }

  function showMaterialsMessage() {
    uniformsEl.innerHTML = '<div class="empty">Model materials shown — switch to the shader to tune properties.</div>';
  }

  function updateLoaded() {
    var rows = [];
    if (state.shaderName) rows.push('<div class="row"><span>Shader:</span><span class="name" title="' + esc(state.shaderName) + '">' + esc(state.shaderName) + "</span></div>");
    if (state.modelName) rows.push('<div class="row"><span>Model:</span><span class="name" title="' + esc(state.modelName) + '">' + esc(state.modelName) + "</span></div>");
    loadedEl.innerHTML = rows.join("");
    loadedEl.hidden = rows.length === 0;
  }

  // ── File dispatch ───────────────────────────────────────────────────
  function extOf(name) { var i = name.lastIndexOf("."); return i < 0 ? "" : name.slice(i + 1).toLowerCase(); }
  function isShaderName(n) { var e = extOf(n); return e === "js" || e === "mjs" || e === "tsl" || e === "txt"; }
  function isModelName(n) { var e = extOf(n); return e === "glb" || e === "gltf"; }
  function junkName(n) { var base = n.split("/").pop(); return n.indexOf("__MACOSX") !== -1 || base.charAt(0) === "."; }

  function handleFiles(files) {
    var list = Array.prototype.slice.call(files);
    var zip = list.find(function (f) { return extOf(f.name) === "zip"; });
    if (zip) { handleZip(zip); return; }
    var shader = list.find(function (f) { return isShaderName(f.name); });
    var model = list.find(function (f) { return isModelName(f.name); });
    if (model) model.arrayBuffer().then(function (buf) { loadModelBuffer(buf, model.name); }).catch(function (e) { showError("Could not read file: " + e.message); });
    if (shader) shader.text().then(function (t) { loadShaderText(t, shader.name); }).catch(function (e) { showError("Could not read file: " + e.message); });
    if (!shader && !model) showError("Unrecognized file. Drop a shader (.js/.tsl), a model (.glb), or a .zip.");
  }

  function handleZip(file) {
    clearError();
    file.arrayBuffer().then(unzip).then(function (entries) {
      var usable = entries.filter(function (e) { return !junkName(e.name); });
      var shader = usable.find(function (e) { return isShaderName(e.name); });
      var model = usable.find(function (e) { return isModelName(e.name); });
